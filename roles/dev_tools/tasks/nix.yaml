- name: Ensure direnv is installed
  ansible.builtin.dnf:
    name: "direnv"
    state: present
  tags: nix

- name: Add direnv initialization to .bashrc
  ansible.builtin.lineinfile:
    path: "/home/{{ target_user }}/.bashrc"
    line: 'eval "$(direnv hook bash)"'
    insertafter: EOF
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0644'
    state: present
  become: true
  become_user: "{{ target_user }}"
  tags: nix

- name: Ensure Nix is installed
  ansible.builtin.dnf:
    name:
      - nix
      - nix-daemon
    state: present
  tags: nix

- name: Ensure .config/nix directory exists with correct permissions
  ansible.builtin.file:
    path: "/home/{{ target_user }}/.config/nix"
    state: directory
    mode: '0700'
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
  become: true
  become_user: "{{ target_user }}"
  tags: nix

- name: Create Nix configuration at user level
  ansible.builtin.template:
    src: "templates/nix_config.j2"
    dest: "/home/{{ target_user }}/.config/nix/nix.conf"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0644'
  become: true
  become_user: "{{ target_user }}"
  tags: nix

- name: Ensure .config/nixpkgs directory exists with correct permissions
  ansible.builtin.file:
    path: "/home/{{ target_user }}/.config/nixpkgs"
    state: directory
    mode: '0700'
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
  become: true
  become_user: "{{ target_user }}"
  tags: nix

- name: Create Nixpkgs configuration at user level
  ansible.builtin.copy:
    content: |
      {
        allowUnfree = true;
      }
    dest: "/home/{{ target_user }}/.config/nixpkgs/config.nix"
    owner: "{{ target_user }}"
    group: "{{ target_user }}"
    mode: '0644'
  tags: nix

- name: Configure Nix trusted-users in /etc/nix/nix.conf
  ansible.builtin.lineinfile:
    path: /etc/nix/nix.conf
    regexp: '^trusted-users ='
    line: "trusted-users = @wheel {{ target_user }}"
    state: present
    create: no
    owner: root
    group: root
    mode: '0644'
  become: true
  tags: nix

- name: Ensure Nix Daemon enabled and started
  ansible.builtin.systemd:
    name: nix-daemon
    enabled: true
    state: started
  tags: nix

- name: Create systemd service for Nix garbage collection
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Nix Garbage Collection
      After=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/bin/nix-collect-garbage -d
    dest: /etc/systemd/system/nix-garbage-collection.service
    owner: root
    group: root
    mode: '0644'
  notify: Reload systemd daemon
  tags: nix

- name: Create systemd timer for Nix garbage collection
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Run Nix garbage collection weekly

      [Timer]
      OnCalendar=weekly
      Persistent=true

      [Install]
      WantedBy=timers.target
    dest: /etc/systemd/system/nix-garbage-collection.timer
    owner: root
    group: root
    mode: '0644'
  notify: Reload systemd daemon
  tags: nix

- name: Ensure Nix garbage collection timer is enabled and started
  ansible.builtin.systemd:
    name: nix-garbage-collection.timer
    enabled: true
    state: started
  tags: nix
